name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Manual Git Clone and Initial Debug Setup # ステップ名を変更
        run: |
          echo "--- Starting Manual Git Clone ---"
          # リポジトリをカレントディレクトリにクローン
          git clone --depth 1 https://github.com/${{ github.repository }}.git .
          echo "--- Git Clone Completed ---"
          # Gitがクローンしたディレクトリに移動
          cd siegenom.github.io # <--- ここが追加・修正点！リポジトリ名に合わせたパスに移動
          echo "--- Changed working directory to cloned repository root ---"
          pwd -P # 変更後の物理パスを表示
        # ★重要: このステップ自体にはworking-directoryは設定せず、
        # git clone が実行される環境のデフォルトパスで行う

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        working-directory: ./ # ここは既に設定済み

      - name: Install dependencies
        run: npm install
        working-directory: ./ # ここは既に設定済み

      - name: Build
        run: astro build
        working-directory: ./ # npm run build ではなく astro build に変更（より直接的）

      - name: List built files
        run: ls -R ./dist
        working-directory: ./ # ここも追加

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
        # ★重要: このアクションはworking-directoryオプションを受け付けません。
        # 代わりにpublish_dirでパスを指定します。

      - name: Debug Deployment
        run: |
          echo "--- Current Git status on gh-pages branch after deploy ---"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # gh-pagesブランチの情報をフェッチしてチェックアウト
          git fetch origin gh-pages
          git checkout gh-pages
          git pull origin gh-pages # リモートのgh-pagesを確実にプル
          echo "Latest commit on gh-pages:"
          git log -1 --pretty=fuller
          echo "--- Listing files in current directory (gh-pages) ---"
          ls -lha
          echo "--- Listing contents of index.html on gh-pages ---"
          cat index.html | head -n 20
          echo "--- Listing files in dist directory (should be deployed) ---"
          ls -lha ./dist
          echo "--- Comparing checksums of deployed index.html and built index.html ---"
          sha256sum index.html || true
          echo "--- End Debug Info ---"
        working-directory: ./ # ここも追加
        continue-on-error: true

      - name: Display Astro Config and Debug File Presence
        run: |
          echo "--- Current Working Directory ---"
          pwd
          echo "--- List Root Directory Contents ---"
          ls -lha ./
          echo "--- Check for astro.config.mjs in root ---"
          if [ -f astro.config.mjs ]; then
            echo "astro.config.mjs found in root."
            echo "--- Contents of astro.config.mjs ---"
            cat astro.config.mjs
          else
            echo "astro.config.mjs NOT found in root."
            echo "--- Search for astro.config.mjs recursively ---"
            find . -name "astro.config.mjs" -print -exec ls -lha {} \; || true
            if [ -f .gitignore ]; then
              cat .gitignore | grep -i "astro.config.mjs" || echo ".gitignore does not contain astro.config.mjs explicitly."
            else
              echo ".gitignore file not found."
            fi
          fi
          echo "--- End Astro Config Debug ---"
        working-directory: ./ # ここも追加
        continue-on-error: true
