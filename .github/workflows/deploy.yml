name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Manual Git Clone and Deep Initial Debug
        run: |
          echo "--- Starting Manual Git Clone ---"
          git clone --depth 1 https://github.com/<span class="math-inline">\{\{ github\.repository \}\}\.git \.
echo "\-\-\- Git Clone Completed \-\-\-"
echo "\-\-\- Environment Variables related to Paths \-\-\-"
env \| grep \-E "PATH\|HOME\|PWD" \# 環境変数の一部をフィルターして表示
echo "\-\-\- Current Working Directory \(Physical Path\) \-\-\-"
pwd \-P \# 現在の物理パスを表示
echo "\-\-\- List All Contents of Current Directory \(Recursive, Hidden Files\) \-\-\-"
ls \-lhaR \./ \# ルートディレクトリから再帰的に全てのファイルとディレクトリをリスト
echo "\-\-\- Git Repository Status in CI Environment \-\-\-"
git status \# Gitリポジトリの現在の状態
echo "\-\-\- Git Tracked Files \(Verbose\) \-\-\-"
git ls\-files \-v \# Gitが追跡しているファイルの詳細リスト
echo "\-\-\- Check Critical Project Files \-\-\-"
CRITICAL\_FILES\=\("package\.json" "astro\.config\.mjs" "\.gitignore" "src/pages/index\.astro"\)
for FILE in "</span>{CRITICAL_FILES[@]}"; do
            echo ""
            echo "Checking file: $FILE"
            if [ -f "$FILE" ]; then
              echo "$FILE found. Details:"
              ls -lha "$FILE" # ファイルの権限、サイズ、タイムスタンプ
              echo "First 20 lines of $FILE:"
              head -n 20 "$FILE" # ファイルの冒頭20行
              echo "SHA256 checksum of $FILE:"
              sha256sum "$FILE" || true # SHA256ハッシュ
            else
              echo "$FILE NOT found."
              echo "Searching for <span class="math-inline">FILE recursively from root\:"
find \. \-name "</span>(basename "$FILE")" -print -exec ls -lha {} \; || true # 見つからない場合に再帰検索
            fi
          done

          echo "--- End Deep Initial Debug ---"
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./

      - name: Build
        run: npm run build
        working-directory: ./

      - name: List built files
        run: ls -R ./dist

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Debug Deployment
        run: |
          echo "--- Current Git status on gh-pages branch after deploy ---"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          git pull origin gh-pages
          echo "Latest commit on gh-pages:"
          git log -1 --pretty=fuller
          echo "--- Listing files in current directory (gh-pages) ---"
          ls -lha
          echo "--- Listing contents of index.html on gh-pages ---"
          cat index.html | head -n 20
          echo "--- Listing files in dist directory
