name: Deploy to GitHub Pages

# mainブランチにプッシュされたときにワークフローを実行
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    # 最新のUbuntu環境で実行
    runs-on: ubuntu-latest

    # ジョブの権限設定
    permissions:
      contents: write # gh-pagesブランチへの書き込みに必要

    steps:
      # -----------------------------------------------------------------
      # ステップ 1: リポジトリのチェックアウト
      # -----------------------------------------------------------------
      # actions/checkout を使用するのが標準的で確実な方法です。
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # ステップ 2: Node.js環境のセットアップ
      # -----------------------------------------------------------------
      # Node.jsのバージョンを指定し、npmのキャッシュを有効化して高速化します。
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # -----------------------------------------------------------------
      # ステップ 3: 依存関係のインストール
      # -----------------------------------------------------------------
      - name: Install dependencies
        run: npm install

      # -----------------------------------------------------------------
      # ステップ 4: プロジェクトのビルド
      # -----------------------------------------------------------------
      # package.jsonのscriptsにある "build" コマンドを実行します。
      - name: Build
        run: npm run build

      # -----------------------------------------------------------------
      # ステップ 5: GitHub Pagesへのデプロイ
      # -----------------------------------------------------------------
      # peaceiris/actions-gh-pages アクションの最新版 v4 を使用します。
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          # デプロイに必要なGITHUB_TOKENを渡します。
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # デプロイするディレクトリを指定します。astro.config.mjsのoutDirと一致させます。
          publish_dir: ./dist
          # force_orphan: true は、デプロイのたびにgh-pagesブランチの履歴をクリーンに保ちます。
          force_orphan: true
