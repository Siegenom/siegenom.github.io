name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write # gh-pages ブランチへの書き込み権限を付与

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: List built files
        run: ls -R ./dist

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Debug Deployment
        run: |
          echo "--- Current Git status on gh-pages branch after deploy ---"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          git pull origin gh-pages
          echo "Latest commit on gh-pages:"
          git log -1 --pretty=fuller
          echo "--- Listing files in current directory (gh-pages) ---"
          ls -lha
          echo "--- Listing contents of index.html on gh-pages ---"
          cat index.html | head -n 20
          echo "--- Listing files in dist directory (should be deployed) ---"
          ls -lha ./dist
          echo "--- Comparing checksums of deployed index.html and built index.html ---"
          sha256sum index.html || true
          echo "--- End Debug Info ---"
        continue-on-error: true

      - name: Display Astro Config # ← この新しいステップを追加
        run: |
          echo "--- Contents of astro.config.mjs (or .ts) ---"
          if [ -f astro.config.mjs ]; then
            cat astro.config.mjs
          elif [ -f astro.config.ts ]; then
            cat astro.config.ts
          else
            echo "Astro config file not found (astro.config.mjs or astro.config.ts)."
          fi
          echo "--- End Astro Config ---"
        continue-on-error: true
