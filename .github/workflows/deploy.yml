name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Manual Git Clone and Initial File Check # ← ステップ名を変更
        run: |
          echo "--- Starting Manual Git Clone ---"
          git clone --depth 0 https://github.com/${{ github.repository }}.git .
          echo "--- Git Clone Completed ---"
          echo "--- List Files Immediately After Clone ---"
          ls -lha ./
          echo "--- Check for astro.config.mjs immediately after clone ---"
          if [ -f astro.config.mjs ]; then
            echo "astro.config.mjs found immediately after clone."
            cat astro.config.mjs
          else
            echo "astro.config.mjs NOT found immediately after clone."
          fi
          echo "--- Check for .gitignore immediately after clone ---"
          if [ -f .gitignore ]; then
            echo ".gitignore found immediately after clone."
            cat .gitignore
          else
            echo ".gitignore NOT found immediately after clone."
          fi
          echo "--- End Manual Git Clone Check ---"
        continue-on-error: true

      # 以下、既存のステップを全て残す（Setup Node.jsから最後まで）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: List built files
        run: ls -R ./dist

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Debug Deployment
        run: |
          echo "--- Current Git status on gh-pages branch after deploy ---"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          git pull origin gh-pages
          echo "Latest commit on gh-pages:"
          git log -1 --pretty=fuller
          echo "--- Listing files in current directory (gh-pages) ---"
          ls -lha
          echo "--- Listing contents of index.html on gh-pages ---"
          cat index.html | head -n 20
          echo "--- Listing files in dist directory (should be deployed) ---"
          ls -lha ./dist
          echo "--- Comparing checksums of deployed index.html and built index.html ---"
          sha256sum index.html || true
          echo "--- End Debug Info ---"
        continue-on-error: true

      - name: Display Astro Config and Debug File Presence
        run: |
          echo "--- Current Working Directory ---"
          pwd
          echo "--- List Root Directory Contents ---"
          ls -lha ./
          echo "--- Check for astro.config.mjs in root ---"
          if [ -f astro.config.mjs ]; then
            echo "astro.config.mjs found in root."
            echo "--- Contents of astro.config.mjs ---"
            cat astro.config.mjs
          else
            echo "astro.config.mjs NOT found in root."
            echo "--- Search for astro.config.mjs recursively ---"
            find . -name "astro.config.mjs"
            echo "--- Check .gitignore for astro.config.mjs ---"
            if [ -f .gitignore ]; then
              cat .gitignore | grep -i "astro.config.mjs" || echo ".gitignore does not contain astro.config.mjs explicitly."
            else
              echo ".gitignore file not found."
            fi
          fi
          echo "--- End Astro Config Debug ---"
        continue-on-error: true
