on:
  push:
    branches:
      - main 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Astroが推奨するNode.jsのバージョン
          cache: 'npm' # npmキャッシュを有効化

      - name: Install dependencies
        run: npm install # プロジェクトの依存関係をインストール

      - name: Build Astro project
        run: npm run build # Astroプロジェクトをビルド (package.jsonのbuildスクリプトを実行)

      # ★ここから大きく変更します！peaceiris/actions-gh-pages@v3 を使います
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3 # GitHub Pagesにデプロイする実績のあるアクション
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # GitHubが提供するトークン
          publish_dir: ./dist # Astroのビルド出力ディレクトリ (通常は dist)
         force_orphan: true
          # publish_branch: gh-pages # デフォルトで gh-pages にデプロイされるため、通常は明示不要
                                  # しかし、念のため明示しておきます。
