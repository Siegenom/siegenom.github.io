name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v2
        with:
          path: . 
          node-version: 20 
          package-manager: npm
          # ★この1行を正確に追加または確認します。
          #   Astroのビルド成果物があるディレクトリを指定します。
   