<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>コンテンツ管理</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@3.1.8/dist/decap-cms.js"></script>
  <script>
    // 主要なリクエストを監視してデバッグ出力
    (function() {
      const origOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url) {
        if (
          url.includes('config.yml') ||
          url.includes('api.github.com') ||
          url.includes('api.netlify.com')
        ) {
          console.log('[DecapCMS Debug] ' + method + ' ' + url);
        }
        return origOpen.apply(this, arguments);
      };
      const origFetch = window.fetch;
      window.fetch = function() {
        const url = arguments[0];
        if (
          typeof url === 'string' &&
          (url.includes('config.yml') ||
           url.includes('api.github.com') ||
           url.includes('api.netlify.com'))
        ) {
          console.log('[DecapCMS Debug] fetch ' + url);
        }
        return origFetch.apply(this, arguments);
      };
    })();

    // 1. localStorage/sessionStorageの内容を出力
    console.log('[DecapCMS Debug] localStorage:', JSON.stringify(localStorage, null, 2));
    console.log('[DecapCMS Debug] sessionStorage:', JSON.stringify(sessionStorage, null, 2));

    // 2. グローバルエラーキャッチ
    window.onerror = function(message, source, lineno, colno, error) {
      console.error('[DecapCMS Debug] window.onerror:', {message, source, lineno, colno, error});
    };

    // 3. console.errorのフック
    const origConsoleError = console.error;
    console.error = function() {
      origConsoleError.apply(console, arguments);
      try {
        document.body.insertAdjacentHTML('beforeend', '<pre style="color:red;background:#fff;">[DecapCMS Debug] console.error: ' + Array.from(arguments).join(' ') + '</pre>');
      } catch(e) {}
    };
  </script>
</body>
</html>
